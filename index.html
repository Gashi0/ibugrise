<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>イブグリース記録</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="イブグリース" />
  <meta name="theme-color" content="#F2F2F7" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F2F2F7; font-family: -apple-system, 'Helvetica Neue', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dot { width:7px;height:7px;border-radius:50%;background:#8E8E93;display:inline-block;animation:blink 1.2s infinite; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

const WEATHER_OPTIONS = [
  { label: "晴れ", emoji: "☀️" },
  { label: "曇り", emoji: "☁️" },
  { label: "雨",   emoji: "🌧️" },
  { label: "雪",   emoji: "❄️" },
  { label: "その他", emoji: "🌈" },
];
const METRICS = [
  { key: "itch",    label: "かゆみ",  color: "#FF6B6B" },
  { key: "redness", label: "赤み",    color: "#FF8C61" },
  { key: "flush",   label: "火照り",  color: "#FFB347" },
];
const LEVEL_LABELS = ["", "なし", "少し", "中程度", "かなり", "ひどい"];
const TABS = [
  { id: "record",   icon: "📝", label: "記録" },
  { id: "graph",    icon: "📈", label: "グラフ" },
  { id: "history",  icon: "📋", label: "履歴" },
  { id: "analyze",  icon: "🔍", label: "分析" },
  { id: "settings", icon: "⚙️", label: "設定" },
];

function pad(n) { return String(n).padStart(2, "0"); }
function nowDate() { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function nowTime() { const d = new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtShort(iso) {
  const d = new Date(iso);
  return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtFull(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}年${pad(d.getMonth()+1)}月${pad(d.getDate())}日 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function LevelPicker({ value, onChange, color }) {
  return (
    <div style={{ display: "flex", gap: 6 }}>
      {[1,2,3,4,5].map(n => {
        const active = value === n;
        return (
          <button key={n} onClick={() => onChange(n === value ? 0 : n)} style={{
            flex: 1, height: 46, borderRadius: 12, border: "none", cursor: "pointer",
            background: active ? color : n < value ? color + "28" : "#F2F2F7",
            color: active ? "#fff" : n < value ? color : "#C7C7CC",
            fontWeight: 700, fontSize: 16,
            transition: "all 0.18s cubic-bezier(.34,1.56,.64,1)",
            transform: active ? "scale(1.1)" : "scale(1)",
            boxShadow: active ? `0 4px 12px ${color}44` : "none",
          }}>{n}</button>
        );
      })}
    </div>
  );
}

function ScoreBar({ value, color }) {
  return (
    <div style={{ display: "flex", gap: 3 }}>
      {[1,2,3,4,5].map(n => (
        <div key={n} style={{ height: 6, flex: 1, borderRadius: 3, background: n <= value ? color : "#E5E5EA" }} />
      ))}
    </div>
  );
}

function AnalysisText({ text }) {
  return (
    <div style={{ fontSize: 15, lineHeight: 1.75, color: "#1C1C1E" }}>
      {text.split("\n").map((line, i) => {
        if (line.startsWith("## ")) return <div key={i} style={{ fontSize: 17, fontWeight: 700, marginTop: 20, marginBottom: 6 }}>{line.replace("## ", "")}</div>;
        if (line.startsWith("# "))  return <div key={i} style={{ fontSize: 19, fontWeight: 700, marginTop: 4, marginBottom: 8 }}>{line.replace("# ", "")}</div>;
        if (line.startsWith("- ") || line.startsWith("• ")) return (
          <div key={i} style={{ display: "flex", gap: 8, marginBottom: 5 }}>
            <span style={{ color: "#007AFF", flexShrink: 0 }}>•</span>
            <span>{line.replace(/^[-•] /, "")}</span>
          </div>
        );
        if (line.trim() === "") return <div key={i} style={{ height: 8 }} />;
        return <div key={i} style={{ marginBottom: 3 }}>{line}</div>;
      })}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("record");
  const [entries, setEntries] = useState([]);
  const [dtDate, setDtDate] = useState(nowDate());
  const [dtTime, setDtTime] = useState(nowTime());
  const [weather, setWeather] = useState("晴れ");
  const [levels, setLevels] = useState({ itch: 0, redness: 0, flush: 0 });
  const [note, setNote] = useState("");
  const [saved, setSaved] = useState(false);
  const [analysis, setAnalysis] = useState("");
  const [analyzing, setAnalyzing] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [apiKeySaved, setApiKeySaved] = useState(false);

  useEffect(() => {
    const e = localStorage.getItem("ibugrise-entries");
    if (e) setEntries(JSON.parse(e));
    const k = localStorage.getItem("ibugrise-apikey");
    if (k) setApiKey(k);
  }, []);

  useEffect(() => {
    if (tab === "record") { setDtDate(nowDate()); setDtTime(nowTime()); }
  }, [tab]);

  function persist(list) {
    setEntries(list);
    localStorage.setItem("ibugrise-entries", JSON.stringify(list));
  }

  function save() {
    const { itch, redness, flush } = levels;
    if (!itch || !redness || !flush) return;
    const entry = { id: Date.now(), datetime: new Date(`${dtDate}T${dtTime}`).toISOString(), weather, itch, redness, flush, note };
    const list = [entry, ...entries].sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
    persist(list);
    setSaved(true);
    setTimeout(() => {
      setSaved(false);
      setDtDate(nowDate()); setDtTime(nowTime());
      setWeather("晴れ"); setLevels({ itch: 0, redness: 0, flush: 0 }); setNote("");
    }, 1600);
  }

  function saveApiKey() {
    localStorage.setItem("ibugrise-apikey", apiKey);
    setApiKeySaved(true);
    setTimeout(() => setApiKeySaved(false), 1800);
  }

  async function analyze() {
    if (!apiKey) { alert("設定タブでAPIキーを入力してください"); return; }
    if (entries.length === 0 || analyzing) return;
    setAnalyzing(true); setAnalysis("");
    try {
      const summary = entries.map(e =>
        `${fmtFull(e.datetime)} / 天気:${e.weather} / かゆみ:${e.itch} / 赤み:${e.redness} / 火照り:${e.flush || 0}${e.note ? " / 備考:" + e.note : ""}`
      ).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1500,
          messages: [{ role: "user", content: `以下はイブグリース（アトピー性皮膚炎）の記録データです。全データを分析して、以下の観点で日本語でわかりやすく教えてください。マークダウンの見出し（##）や箇条書き（-）を使って整理してください。\n\n## 分析してほしいこと\n- 全体的なトレンド（改善傾向・悪化傾向）\n- 症状が悪化しやすいパターンや時間帯・天気との関係\n- かゆみ・赤み・火照りそれぞれの特徴\n- 備考欄から読み取れること（あれば）\n- 改善のためのアドバイス\n\n## 記録データ\n${summary}\n\nデータ件数: 全${entries.length}件` }],
        }),
      });
      const data = await res.json();
      if (data.error) { setAnalysis("エラー: " + data.error.message); return; }
      setAnalysis(data.content?.[0]?.text || "分析に失敗しました。");
    } catch(e) {
      setAnalysis("エラーが発生しました: " + e.message);
    } finally { setAnalyzing(false); }
  }

  const canSave = levels.itch > 0 && levels.redness > 0 && levels.flush > 0;
  const recent7 = entries.slice(0, 7);
  const graphData = [...entries].reverse().slice(-20).map(e => ({
    t: fmtShort(e.datetime), かゆみ: e.itch, 赤み: e.redness, 火照り: e.flush || 0,
  }));

  const card = { background: "#fff", borderRadius: 18, padding: "16px 18px", marginBottom: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04)" };
  const sLabel = { fontSize: 13, fontWeight: 600, color: "#8E8E93", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 10, display: "block" };
  const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid #E5E5EA", background: "#F2F2F7", fontSize: 14, color: "#1C1C1E", outline: "none", boxSizing: "border-box" };

  const tabTitles = { record: "イブグリース記録", graph: "グラフ", history: "履歴", analyze: "AI分析", settings: "設定" };
  const tabSubs = { record: "日時は変更できます", graph: `${entries.length}件の記録`, history: `全${entries.length}件`, analyze: "記録から傾向を分析", settings: "APIキーなどの設定" };

  return (
    <div style={{ minHeight: "100vh", background: "#F2F2F7", display: "flex", flexDirection: "column", maxWidth: 430, margin: "0 auto" }}>
      {/* Top bar */}
      <div style={{ background: "rgba(242,242,247,0.94)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderBottom: "0.5px solid #D1D1D6", padding: "52px 20px 14px", position: "sticky", top: 0, zIndex: 20 }}>
        <div style={{ fontSize: 28, fontWeight: 700, color: "#1C1C1E", letterSpacing: "-0.5px" }}>{tabTitles[tab]}</div>
        <div style={{ fontSize: 13, color: "#8E8E93", marginTop: 2 }}>{tabSubs[tab]}</div>
      </div>

      {/* Scroll area */}
      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 100 }}>

        {/* 記録 */}
        {tab === "record" && (
          <div style={{ padding: "16px 16px 20px" }}>
            <div style={card}>
              <span style={sLabel}>日時</span>
              <div style={{ display: "flex", gap: 8 }}>
                <input type="date" value={dtDate} onChange={e => setDtDate(e.target.value)} style={{ ...inputStyle, flex: 1, minWidth: 0 }} />
                <input type="time" value={dtTime} onChange={e => setDtTime(e.target.value)} style={{ ...inputStyle, width: 90, minWidth: 0, flex: "none" }} />
              </div>
            </div>
            <div style={card}>
              <span style={sLabel}>天気</span>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {WEATHER_OPTIONS.map(w => (
                  <button key={w.label} onClick={() => setWeather(w.label)} style={{
                    padding: "9px 14px", borderRadius: 12, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 600,
                    background: weather === w.label ? "#007AFF" : "#F2F2F7",
                    color: weather === w.label ? "#fff" : "#3C3C43",
                    boxShadow: weather === w.label ? "0 2px 8px rgba(0,122,255,0.3)" : "none",
                    transition: "all 0.15s",
                  }}>{w.emoji} {w.label}</button>
                ))}
              </div>
            </div>
            {METRICS.map(m => (
              <div key={m.key} style={card}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <span style={sLabel}>{m.label}</span>
                  {levels[m.key] > 0 && <span style={{ fontSize: 13, fontWeight: 600, color: m.color }}>{LEVEL_LABELS[levels[m.key]]}</span>}
                </div>
                <LevelPicker value={levels[m.key]} onChange={v => setLevels(p => ({ ...p, [m.key]: v }))} color={m.color} />
              </div>
            ))}
            <div style={card}>
              <span style={sLabel}>備考（任意）</span>
              <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="気になることや状況など..."
                style={{ ...inputStyle, resize: "vertical", minHeight: 80, fontFamily: "inherit", lineHeight: 1.5 }} />
            </div>
            <button onClick={save} disabled={!canSave} style={{
              width: "100%", padding: "16px", borderRadius: 16, border: "none",
              cursor: canSave ? "pointer" : "not-allowed",
              background: saved ? "#34C759" : canSave ? "#007AFF" : "#E5E5EA",
              color: canSave || saved ? "#fff" : "#C7C7CC",
              fontSize: 17, fontWeight: 600,
              boxShadow: canSave ? (saved ? "0 4px 16px rgba(52,199,89,0.4)" : "0 4px 16px rgba(0,122,255,0.35)") : "none",
              transition: "all 0.25s",
            }}>{saved ? "✓ 保存しました" : "保存する"}</button>
            {!canSave && <div style={{ textAlign: "center", fontSize: 13, color: "#8E8E93", marginTop: 10 }}>3項目すべてのレベルを選んでください</div>}
          </div>
        )}

        {/* グラフ */}
        {tab === "graph" && (
          <div style={{ padding: "16px 16px 20px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
              {METRICS.map(m => {
                const val = recent7.length ? (recent7.reduce((a, b) => a + (b[m.key] || 0), 0) / recent7.length).toFixed(1) : "–";
                return (
                  <div key={m.key} style={{ ...card, marginBottom: 0, textAlign: "center", padding: "14px 10px" }}>
                    <div style={{ fontSize: 11, color: "#8E8E93", fontWeight: 600, marginBottom: 6 }}>{m.label}</div>
                    <div style={{ fontSize: 26, fontWeight: 700, color: m.color, letterSpacing: "-1px" }}>{val}</div>
                    <div style={{ fontSize: 11, color: "#C7C7CC" }}>直近7件</div>
                  </div>
                );
              })}
            </div>
            <div style={{ ...card, padding: "16px 8px 8px" }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#3C3C43", marginBottom: 14, paddingLeft: 10 }}>直近20件の推移</div>
              {graphData.length === 0
                ? <div style={{ textAlign: "center", padding: "32px 0", color: "#8E8E93" }}>記録がまだありません</div>
                : <ResponsiveContainer width="100%" height={220}>
                    <LineChart data={graphData} margin={{ top: 4, right: 16, left: -24, bottom: 56 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#F2F2F7" />
                      <XAxis dataKey="t" tick={{ fontSize: 9, fill: "#8E8E93" }} angle={-40} textAnchor="end" interval={0} />
                      <YAxis domain={[0, 5]} ticks={[1,2,3,4,5]} tick={{ fontSize: 10, fill: "#8E8E93" }} />
                      <Tooltip contentStyle={{ borderRadius: 14, border: "none", boxShadow: "0 8px 30px rgba(0,0,0,0.12)", fontSize: 13 }} />
                      {METRICS.map(m => <Line key={m.key} type="monotone" dataKey={m.label} stroke={m.color} strokeWidth={2.5} dot={{ fill: m.color, r: 3 }} activeDot={{ r: 5 }} />)}
                    </LineChart>
                  </ResponsiveContainer>
              }
            </div>
          </div>
        )}

        {/* 履歴 */}
        {tab === "history" && (
          <div style={{ padding: "16px 16px 20px" }}>
            {entries.length === 0
              ? <div style={{ textAlign: "center", paddingTop: 80, color: "#8E8E93" }}>
                  <div style={{ fontSize: 52, marginBottom: 14 }}>📭</div>
                  <div style={{ fontSize: 17, fontWeight: 500 }}>記録がありません</div>
                </div>
              : entries.map(e => {
                  const worst = Math.max(e.itch, e.redness, e.flush || 0);
                  const wColor = ["","#34C759","#A3E635","#FF9F0A","#FF6B6B","#FF3B30"][worst];
                  return (
                    <div key={e.id} style={{ ...card, padding: "14px 16px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                        <div>
                          <div style={{ fontSize: 15, fontWeight: 600, color: "#1C1C1E" }}>{fmtFull(e.datetime)}</div>
                          <div style={{ fontSize: 13, color: "#8E8E93", marginTop: 2 }}>
                            {(WEATHER_OPTIONS.find(w => w.label === e.weather) || {}).emoji || "🌈"} {e.weather}
                          </div>
                        </div>
                        <div style={{ width: 10, height: 10, borderRadius: "50%", background: wColor, marginTop: 4, boxShadow: `0 0 6px ${wColor}88` }} />
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {METRICS.map(m => (
                          <div key={m.key} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <div style={{ fontSize: 12, color: "#8E8E93", width: 38, flexShrink: 0 }}>{m.label}</div>
                            <div style={{ flex: 1 }}><ScoreBar value={e[m.key] || 0} color={m.color} /></div>
                            <div style={{ fontSize: 13, fontWeight: 600, color: m.color, width: 16, textAlign: "right" }}>{e[m.key] || 0}</div>
                          </div>
                        ))}
                      </div>
                      {e.note ? <div style={{ marginTop: 10, padding: "8px 12px", background: "#F2F2F7", borderRadius: 10, fontSize: 13, color: "#3C3C43", lineHeight: 1.5 }}>{e.note}</div> : null}
                    </div>
                  );
                })
            }
          </div>
        )}

        {/* 分析 */}
        {tab === "analyze" && (
          <div style={{ padding: "16px 16px 20px" }}>
            {entries.length === 0
              ? <div style={{ textAlign: "center", paddingTop: 80, color: "#8E8E93" }}>
                  <div style={{ fontSize: 52, marginBottom: 14 }}>📊</div>
                  <div style={{ fontSize: 17, fontWeight: 500 }}>記録がありません</div>
                </div>
              : <>
                  <div style={{ ...card, background: "linear-gradient(135deg, #007AFF11, #34C75911)", border: "1px solid #007AFF22" }}>
                    <div style={{ fontSize: 14, color: "#3C3C43", lineHeight: 1.6, marginBottom: 14 }}>
                      <span style={{ fontWeight: 700, color: "#007AFF" }}>全{entries.length}件</span>の記録をClaudeが分析します。
                    </div>
                    {!apiKey && <div style={{ fontSize: 13, color: "#FF3B30", marginBottom: 12 }}>⚠️ 設定タブでAPIキーを入力してください</div>}
                    <button onClick={analyze} disabled={analyzing || !apiKey} style={{
                      width: "100%", padding: "14px", borderRadius: 14, border: "none",
                      cursor: (analyzing || !apiKey) ? "not-allowed" : "pointer",
                      background: analyzing ? "#E5E5EA" : !apiKey ? "#E5E5EA" : "#007AFF",
                      color: (analyzing || !apiKey) ? "#8E8E93" : "#fff",
                      fontSize: 16, fontWeight: 600,
                      boxShadow: (!analyzing && apiKey) ? "0 4px 16px rgba(0,122,255,0.35)" : "none",
                      transition: "all 0.2s",
                      display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                    }}>
                      {analyzing
                        ? <><span className="dot" style={{ animationDelay: "0s" }} /><span className="dot" style={{ animationDelay: "0.2s" }} /><span className="dot" style={{ animationDelay: "0.4s" }} />&nbsp;分析中...</>
                        : "🔍 分析する"}
                    </button>
                  </div>
                  {analysis && (
                    <div style={card}>
                      <AnalysisText text={analysis} />
                      <div style={{ marginTop: 16, paddingTop: 12, borderTop: "0.5px solid #E5E5EA", fontSize: 12, color: "#8E8E93" }}>
                        ※ AIによる分析です。医療的なアドバイスではありません。
                      </div>
                    </div>
                  )}
                </>
            }
          </div>
        )}

        {/* 設定 */}
        {tab === "settings" && (
          <div style={{ padding: "16px 16px 20px" }}>
            <div style={card}>
              <span style={sLabel}>Anthropic APIキー</span>
              <p style={{ fontSize: 13, color: "#8E8E93", marginBottom: 12, lineHeight: 1.5 }}>
                AI分析機能に必要です。<br />
                <a href="https://console.anthropic.com/" target="_blank" style={{ color: "#007AFF" }}>console.anthropic.com</a> で取得できます。
              </p>
              <input
                type="password"
                value={apiKey}
                onChange={e => setApiKey(e.target.value)}
                placeholder="sk-ant-..."
                style={{ ...inputStyle, marginBottom: 12, fontFamily: "monospace", fontSize: 13 }}
              />
              <button onClick={saveApiKey} style={{
                width: "100%", padding: "13px", borderRadius: 13, border: "none", cursor: "pointer",
                background: apiKeySaved ? "#34C759" : "#007AFF",
                color: "#fff", fontSize: 16, fontWeight: 600,
                boxShadow: apiKeySaved ? "0 4px 16px rgba(52,199,89,0.4)" : "0 4px 16px rgba(0,122,255,0.35)",
                transition: "all 0.25s",
              }}>{apiKeySaved ? "✓ 保存しました" : "保存する"}</button>
            </div>
            <div style={card}>
              <span style={sLabel}>データ管理</span>
              <p style={{ fontSize: 13, color: "#8E8E93", marginBottom: 12, lineHeight: 1.5 }}>
                データはこのデバイスのブラウザに保存されます。
              </p>
              <button onClick={() => {
                if (confirm("全データを削除しますか？この操作は元に戻せません。")) {
                  localStorage.removeItem("ibugrise-entries");
                  setEntries([]);
                }
              }} style={{
                width: "100%", padding: "13px", borderRadius: 13, border: "none", cursor: "pointer",
                background: "#FF3B30", color: "#fff", fontSize: 15, fontWeight: 600,
                boxShadow: "0 4px 16px rgba(255,59,48,0.3)",
              }}>🗑️ 全データを削除する</button>
            </div>
          </div>
        )}
      </div>

      {/* Bottom tab bar */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "rgba(242,242,247,0.95)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderTop: "0.5px solid #D1D1D6", display: "flex", paddingBottom: "env(safe-area-inset-bottom, 16px)", zIndex: 20 }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, border: "none", background: "transparent", cursor: "pointer",
            display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 10, gap: 3,
          }}>
            <span style={{ fontSize: 22, filter: tab === t.id ? "none" : "grayscale(1) opacity(0.4)" }}>{t.icon}</span>
            <span style={{ fontSize: 10, fontWeight: 600, color: tab === t.id ? "#007AFF" : "#8E8E93" }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
